<h2 id="核心工具类">核心工具类</h2>

t</span> com.aliyuncs.DefaultAcsClient;<br><span class="hljs-keyword">import</span> com.aliyuncs.IAcsClient;<br><span class="hljs-keyword">import</span> com.aliyuncs.exceptions.ClientException;<br><span class="hljs-keyword">import</span> com.aliyuncs.exceptions.ServerException;<br><span class="hljs-keyword">import</span> com.aliyuncs.http.MethodType;<br><span class="hljs-keyword">import</span> com.aliyuncs.profile.DefaultProfile;<br><span class="hljs-keyword">import</span> org.springframework.stereotype.Service;<br><br><span class="hljs-keyword">import</span> java.util.HashMap;<br><span class="hljs-keyword">import</span> java.util.Map;<br><br><span class="hljs-meta">@Service</span><br><span class="hljs-keyword">public</span> <span class="hljs-class"><span class="hljs-keyword">class</span> <span class="hljs-title">AliSmsUtil</span> </span>&#123;<br>    <span class="hljs-meta">@Override</span><br>    <span class="hljs-function"><span class="hljs-keyword">public</span> <span class="hljs-keyword">boolean</span> <span class="hljs-title">send</span><span class="hljs-params">(String phoneNum, String templateCode, Map&lt;String, Object&gt; param)</span> </span>&#123;<br>        <span class="hljs-comment">//连接阿里云</span><br>        DefaultProfile profile = DefaultProfile.getProfile(<span class="hljs-string">&quot;cn-hangzhou&quot;</span>, <span class="hljs-string">&quot;AccessKey ID&quot;</span>, <span class="hljs-string">&quot;AccessKey Secret&quot;</span>);<br>        IAcsClient client = <span class="hljs-keyword">new</span> DefaultAcsClient(profile);<br><br>        <span class="hljs-comment">//构建请求</span><br>        CommonRequest request = <span class="hljs-keyword">new</span> CommonRequest();<br>        request.setSysMethod(MethodType.POST);<br>        request.setSysDomain(<span class="hljs-string">&quot;dysmsapi.aliyuncs.com&quot;</span>);<br>        request.setSysVersion(<span class="hljs-string">&quot;2017-05-25&quot;</span>);<br>        request.setSysAction(<span class="hljs-string">&quot;SendSms&quot;</span>);<br><br>        <span class="hljs-comment">//自定义的参数(手机号,验证码,签名,模版)</span><br>        request.putQueryParameter(<span class="hljs-string">&quot;RegionId&quot;</span>, <span class="hljs-string">&quot;cn-hangzhou&quot;</span>);<br>        request.putQueryParameter(<span class="hljs-string">&quot;PhoneNumbers&quot;</span>, phoneNum);<br>        request.putQueryParameter(<span class="hljs-string">&quot;SignName&quot;</span>, <span class="hljs-string">&quot;软件魔法&quot;</span>);<br>        request.putQueryParameter(<span class="hljs-string">&quot;TemplateCode&quot;</span>, templateCode);<br><br>        request.putQueryParameter(<span class="hljs-string">&quot;TemplateParam&quot;</span>, JSONObject.toJSONString(param));<br><br>        <span class="hljs-keyword">try</span> &#123;<br>            CommonResponse response = client.getCommonResponse(request);<br>            System.out.println(response.getData());<br>            <span class="hljs-keyword">return</span> response.getHttpResponse().isSuccess();<br>        &#125; <span class="hljs-keyword">catch</span> (ServerException e) &#123;<br>            e.printStackTrace();<br>        &#125; <span class="hljs-keyword">catch</span> (ClientException e) &#123;<br>            e.printStackTrace();<br>        &#125;<br>        <span class="hljs-keyword">return</span> <span class="hljs-keyword">false</span>;<br>    &#125;<br><br>&#125;<br><br></code></pre></td></tr></table></figure>

mework.web.bind.annotation.CrossOrigin;<br><span class="hljs-keyword">import</span> org.springframework.web.bind.annotation.GetMapping;<br><span class="hljs-keyword">import</span> org.springframework.web.bind.annotation.PathVariable;<br><span class="hljs-keyword">import</span> org.springframework.web.bind.annotation.RestController;<br><br><span class="hljs-keyword">import</span> java.util.HashMap;<br><span class="hljs-keyword">import</span> java.util.UUID;<br><span class="hljs-keyword">import</span> java.util.concurrent.TimeUnit;<br><br><span class="hljs-meta">@RestController</span><br><span class="hljs-meta">@CrossOrigin</span> <span class="hljs-comment">//跨域支持</span><br><span class="hljs-keyword">public</span> <span class="hljs-class"><span class="hljs-keyword">class</span> <span class="hljs-title">SmsApiController</span> </span>&#123;<br><br>    <span class="hljs-meta">@Autowired</span><br>    <span class="hljs-keyword">private</span> AliSmsUtil aliSmsUtil;<br><br>    <span class="hljs-meta">@Autowired</span><br>    <span class="hljs-keyword">private</span> RedisTemplate&lt;String, String&gt; redisTemplate;<br><br>    <span class="hljs-meta">@GetMapping(&quot;/send/&#123;phone&#125;&quot;)</span><br>    <span class="hljs-function"><span class="hljs-keyword">public</span> String <span class="hljs-title">code</span><span class="hljs-params">(<span class="hljs-meta">@PathVariable(&quot;phone&quot;)</span> String phone)</span> </span>&#123;<br>        String code;<br>        code= redisTemplate.opsForValue().get(phone);<br>        <span class="hljs-keyword">if</span> (!StringUtils.isEmpty(code)) &#123;<br>            <span class="hljs-keyword">return</span> phone + <span class="hljs-string">&quot;:&quot;</span> + code + <span class="hljs-string">&quot;已存在,还没有过期&quot;</span>;<br>        &#125;<br><br>        <span class="hljs-comment">//生成验证码并存储到redis中</span><br>        code = String.valueOf((<span class="hljs-keyword">int</span>) ((Math.random() * <span class="hljs-number">9</span> + <span class="hljs-number">1</span>) * <span class="hljs-number">100000</span>));<br>        HashMap&lt;String, Object&gt; param = <span class="hljs-keyword">new</span> HashMap&lt;&gt;();<br>        param.put(<span class="hljs-string">&quot;code&quot;</span>, code);<br><br>        <span class="hljs-keyword">boolean</span> isSend = aliSmsUtil.send(phone, <span class="hljs-string">&quot;SMS_198667517&quot;</span>, param);<br>        <span class="hljs-keyword">if</span> (isSend) &#123;<br>            redisTemplate.opsForValue().set(phone, code, <span class="hljs-number">5</span>, TimeUnit.MINUTES);<br>            <span class="hljs-keyword">return</span> phone + <span class="hljs-string">&quot;:&quot;</span> + code + <span class="hljs-string">&quot;发送成功!&quot;</span>;<br>        &#125; <span class="hljs-keyword">else</span> &#123;<br>            <span class="hljs-keyword">return</span> <span class="hljs-string">&quot;发送失败!&quot;</span>;<br>        &#125;<br>    &#125;<br>&#125;<br><br></code></pre></td></tr></table></figure>
